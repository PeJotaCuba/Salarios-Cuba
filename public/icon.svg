<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3" flood-color="#000000" />
    </filter>
  </defs>
  
  <!-- White Star with subtle shadow for visibility on any background -->
  <polygon points="112,24 130,78 188,78 141,112 159,166 112,132 65,166 83,112 36,78 94,78" fill="#FFFFFF" filter="url(#shadow)" />
  
  <!-- Ascending Bar Chart mimicking growth + Cuban flag colors -->
  <!-- Left Bar (Red) directly beneath the star -->
  <rect x="64" y="200" width="96" height="280" rx="12" fill="#CF142B" />
  
  <!-- Middle Bar (Blue) -->
  <rect x="208" y="144" width="96" height="336" rx="12" fill="#002A8F" />
  
  <!-- Right Bar (Blue, Tallest) -->
  <rect x="352" y="32" width="96" height="448" rx="12" fill="#002A8F" />
</svg>
