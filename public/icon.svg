<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256" />
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" flood-color="#000000" />
    </filter>
  </defs>
  
  <g clip-path="url(#circleClip)">
    <!-- Base Blue Background (flag stripes) -->
    <rect width="512" height="512" fill="#002A8F" />
    <!-- White Stripes -->
    <rect y="102.4" width="512" height="102.4" fill="#FFFFFF" />
    <rect y="307.2" width="512" height="102.4" fill="#FFFFFF" />
    
    <!-- Growth/Salary upward bars overlaid on stripes -->
    <g filter="url(#shadow)">
      <rect x="250" y="320" width="40" height="180" fill="#FFD700" rx="8" />
      <rect x="330" y="240" width="40" height="260" fill="#E6C200" rx="8" />
      <rect x="410" y="140" width="40" height="360" fill="#FFD700" rx="8" />
    </g>

    <!-- Red Triangle -->
    <polygon points="0,0 295,256 0,512" fill="#CF142B" filter="url(#shadow)" />
    
    <!-- White Star -->
    <polygon points="100,165 120,225 185,225 135,265 155,330 100,290 45,330 65,265 15,225 80,225" fill="#FFFFFF" />
  </g>
</svg>
