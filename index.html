<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salarios Cuba</title>
    <meta name="description" content="Calculadora de la escala salarial del sector presupuestado en Cuba." />
    <meta name="theme-color" content="#002A8F" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (const registration of registrations) {
            registration.unregister().then(() => {
              console.log('Service Worker unregistered successfully to avoid stale development cache');
            });
          }
        }).catch((err) => {
          console.error('Error unregistering Service Worker:', err);
        });
      }
    </script>
  </body>
</html>
